<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" ry="111"
    fill="none" stroke="#4ec9ff" stroke-width="1.5" opacity="0.12"/>

  <!-- >_ -->
  <text x="256" y="300" font-family="'SF Mono', 'Fira Mono', 'Consolas', monospace"
    font-size="192" font-weight="600" fill="#4ec9ff"
    text-anchor="middle" filter="url(#glow)">&gt;_</text>
</svg>
