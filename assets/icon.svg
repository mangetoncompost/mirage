<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="haze" x="-5%" y="-20%" width="110%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.1" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- horizon line with heat haze -->
  <g filter="url(#haze)" opacity="0.3">
    <line x1="80" y1="380" x2="432" y2="380" stroke="#3dffa0" stroke-width="1"/>
    <line x1="100" y1="390" x2="412" y2="390" stroke="#3dffa0" stroke-width="0.7"/>
    <line x1="120" y1="399" x2="392" y2="399" stroke="#3dffa0" stroke-width="0.5"/>
  </g>

  <!-- prompt -->
  <text x="256" y="310" font-family="'SF Mono', 'Fira Mono', monospace"
    font-size="180" font-weight="500" fill="#3dffa0"
    text-anchor="middle" filter="url(#glow)">&gt;_</text>
</svg>
